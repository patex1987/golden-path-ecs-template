receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

extensions:
  health_check: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889

  debug:
    verbosity: basic

  otlp_grpc/external_traces:
    endpoint: ${env:OTEL_COLLECTOR_TRACE_EXPORTER_OTLP_ENDPOINT}
    tls:
      insecure: true

  otlp_grpc/external_metrics:
    endpoint: ${env:OTEL_COLLECTOR_METRIC_EXPORTER_OTLP_ENDPOINT}
    tls:
      insecure: true

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_grpc/external_traces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, otlp_grpc/external_metrics]
